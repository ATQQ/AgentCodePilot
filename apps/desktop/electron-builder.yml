# Local / smoke packaging (fast).
# - mac: dmg + zip, arm64 only (no tar.gz, no x64 cross-build)
# - win: msi only
# - linux: AppImage + deb, single arch via CLI flags
#
# Full multi-format release builds use electron-builder.release.yml (CI + *:release scripts).

appId: com.agentcodepilot.app
productName: AgentCodePilot
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - node_modules/@anthropic-ai/**
  - node_modules/node-pty/**
icon: build/icon.png
win:
  executableName: AgentCodePilot
  icon: build/icon.ico
  target:
    - target: msi
      arch: x64
msi:
  artifactName: ${productName}-v${version}-Windows.${ext}
mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch: arm64
    - target: zip
      arch: arm64
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  artifactName: ${productName}-v${version}-macOS-${arch}.${ext}
dmg:
  writeUpdateInfo: false
linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
  maintainer: electronjs.org
  category: Utility
deb:
  artifactName: ${productName}-v${version}-Linux-${arch}.${ext}
appImage:
  artifactName: ${productName}-v${version}-Linux-${arch}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: ATQQ
  repo: AgentCodePilot
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
