name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      npm_config_registry: https://registry.npmjs.org/
      npm_config_electron_mirror: ''
      npm_config_electron_builder_binaries_mirror: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality checks
        run: pnpm check

  # Validates release electron-builder config (executableName, AppImage, deb metadata).
  # Uses Linux AppImage + deb on PR/main — full multi-platform release runs on tag only.
  pack-smoke:
    needs: check
    runs-on: ubuntu-latest
    env:
      npm_config_registry: https://registry.npmjs.org/
      npm_config_electron_mirror: ''
      npm_config_electron_builder_binaries_mirror: ''
      ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm -C apps/desktop build

      - name: Smoke-pack Linux AppImage + deb (release config, no publish)
        run: pnpm -C apps/desktop exec electron-builder --config electron-builder.release.yml --linux AppImage deb --x64 --publish never
